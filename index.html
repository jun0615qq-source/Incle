<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>구독 서비스 통합 관리 대시보드</title>
    <link rel="stylesheet" href="style.css">
    
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- Phosphor Icons (Premium alternative for Lucide in Vanilla) -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body>
    <div id="app">
        <!-- 1. Login Screen -->
        <div id="login-screen" class="screen active">
            <div class="login-container">
                <div class="logo">
                    <i class="ph-fill ph-infinity"></i>
                    <h2>SubSync</h2>
                    <p>당신의 모든 구독을 한눈에</p>
                </div>
                
                <form id="auth-form">
                    <div id="auth-error" class="auth-error-msg" style="display: none;"></div>
                    
                    <div class="input-group" id="name-group" style="display: none;">
                        <i class="ph ph-user"></i>
                        <input type="text" placeholder="이름" id="name-input">
                    </div>
                    <div class="input-group">
                        <i class="ph ph-envelope-simple"></i>
                        <input type="email" placeholder="이메일 주소" required id="email-input">
                    </div>
                    <div class="input-group">
                        <i class="ph ph-lock-key"></i>
                        <input type="password" placeholder="비밀번호" required id="pwd-input">
                    </div>
                    
                    <button type="submit" class="btn-primary" id="auth-btn">로그인하여 시작하기</button>
                    
                    <div class="auth-switch">
                        <span id="switch-prompt">계정이 없으신가요?</span>
                        <a href="#" id="auth-toggle-btn">회원가입</a>
                    </div>
                </form>
                
                <div class="security-badge">
                    <i class="ph-fill ph-shield-check"></i>
                    <span>강력한 보안으로 데이터를 보호합니다</span>
                </div>
            </div>
        </div>

        <!-- 1.5. Scanning Screen -->
        <div id="scanning-screen" class="screen">
            <div class="scanning-container">
                <div class="scanning-icon">
                    <i class="ph-duotone ph-envelope-open"></i>
                </div>
                <h2 class="scanning-title">이메일 스캔 중...</h2>
                <p class="scanning-desc" id="scanning-email-text">결제 내역을 임포트 중입니다.</p>
                
                <div class="progress-bar-container">
                    <div class="progress-bar" id="scan-progress"></div>
                </div>
                
                <p class="scanning-status" id="scan-status-text">서버 연결 중...</p>
            </div>
        </div>

        <!-- 2. Main Dashboard Screen -->
        <div id="dashboard-screen" class="screen">
            <!-- Header -->
            <header class="app-header">
                <div>
                    <h1>SubSync</h1>
                    <p class="greeting">안녕하세요, <strong>유저</strong>님!</p>
                </div>
                <div class="avatar">
                    <img src="https://ui-avatars.com/api/?name=User&background=111&color=fff&rounded=true" alt="User Avatar">
                </div>
            </header>

            <!-- Dashboard Content Tabs -->
            <main class="dashboard-content tab-content active" id="tab-home">
                <!-- Reminder Alert -->
                <div class="alert-box" id="reminder-alert" style="display: none;">
                    <div class="alert-icon"><i class="ph-fill ph-bell-ringing"></i></div>
                    <div class="alert-text">
                        <strong>넷플릭스</strong> 결제일이 곧 다가옵니다!
                    </div>
                </div>

                <!-- Subscriptions List -->
                <section class="subscriptions-section">
                    <h2 class="section-title">내 구독 목록 <span class="badge" id="sub-count">0</span></h2>
                    <div class="subs-list" id="subs-list">
                        <!-- Items injected by JS -->
                    </div>
                    <button class="btn-secondary add-btn" id="open-modal-btn">
                        <i class="ph ph-plus"></i> 새로운 구독 추가
                    </button>
                </section>
                <div class="spacing-bottom"></div>
            </main>

            <main class="dashboard-content tab-content" id="tab-stats" style="display: none;">
                <!-- Analytics Section -->
                <section class="analytics-section">
                    <h2 class="section-title">월별 지출 분석</h2>
                    <div class="total-card">
                        <p>이번 달 총 결제 예정 금액</p>
                        <h3 id="total-amount">₩0</h3>
                    </div>
                    <div class="chart-container">
                        <canvas id="spendingChart"></canvas>
                    </div>
                </section>
                <div class="spacing-bottom"></div>
            </main>

            <main class="dashboard-content tab-content" id="tab-profile" style="display: none;">
                <section class="profile-section" style="padding: 24px;">
                    <h2 class="section-title">내 정보</h2>
                    <div class="sub-item" style="margin-top:20px; text-align:center; display:block;">
                        <h3 class="greeting" style="margin-bottom:10px;">안녕하세요!</h3>
                        <p id="profile-email" style="color:var(--secondary); margin-bottom: 20px;"></p>
                        <button class="btn-primary" id="logout-btn" style="width:100%; padding:14px; background:var(--danger);">로그아웃</button>
                    </div>
                </section>
            </main>

            <!-- Bottom Navigation -->
            <nav class="bottom-nav">
                <a href="#" class="nav-item active" data-tab="tab-home">
                    <i class="ph-fill ph-house"></i>
                    <span>홈</span>
                </a>
                <a href="#" class="nav-item" data-tab="tab-stats">
                    <i class="ph ph-chart-donut"></i>
                    <span>통계</span>
                </a>
                <a href="#" class="nav-item" data-tab="tab-profile">
                    <i class="ph ph-user"></i>
                    <span>내 정보</span>
                </a>
            </nav>
        </div>
    </div>

    <!-- Adding New Subscription Modal -->
    <div id="add-modal" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <div class="modal-header" style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                <h3 style="font-size:18px; font-weight:700;">새로운 구독 추가</h3>
                <button class="close-modal-btn" id="close-modal-btn" style="background:none; border:none; font-size:24px; cursor:pointer;"><i class="ph ph-x"></i></button>
            </div>
            <form id="add-sub-form">
                <div class="input-group" style="margin-bottom:12px;">
                    <input type="text" id="add-name" placeholder="서비스 이름 (예: 넷플릭스)" required style="padding: 14px 16px;">
                </div>
                <div class="input-group" style="margin-bottom:12px;">
                    <input type="number" id="add-price" placeholder="결제 금액 (예: 17000)" required style="padding: 14px 16px;">
                </div>
                <div class="input-group" style="margin-bottom:20px;">
                    <input type="number" id="add-date" placeholder="결제일 (1~31)" min="1" max="31" required style="padding: 14px 16px;">
                </div>
                <button type="submit" class="btn-primary" style="width:100%;">추가하기</button>
            </form>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
